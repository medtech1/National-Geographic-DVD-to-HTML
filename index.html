<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flipbook Viewer</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #111;
  overflow: hidden;
  font-family: sans-serif;
}

/* TOP LEFT TOOLBAR */
.top-controls {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  padding: 8px 10px;
  border-radius: 6px;
}

#viewer {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SINGLE PAGE */
.single-page {
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
  display: block;
}

/* SPREAD */
.spread {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.spread img,
.not-found {
  height: 100vh;
  width: auto;
  object-fit: contain;
  display: block;
}

/* Not found */
.not-found {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: #333;
  font-size: 24px;
  padding: 20px;
}

/*  NAV BUTTONS */
/*.controls {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px; */

.controls {
  position: fixed;
  bottom: 10px;
  left: 10px;   /*  move to left */
  display: flex;
  gap: 10px;
}

/* subtle arrow buttons */
.controls button {
  padding: 6px 10px;
  font-size: 30px;
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 0, 1);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 4px;
  cursor: pointer;
  opacity: 1.5;
  transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
}

/* hover effect */
.controls button:hover {
  opacity: 1;
  background: rgba(255, 255, 255, 0.15);
  color: rgba(255, 255, 255, 0.9);
}

/* UI selects */
button, select {
  padding: 6px 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<!--  YEAR / MONTH CONTROLS -->
<div class="top-controls">
  <select id="yearSelect"></select>
  <select id="monthSelect"></select>
</div>

<div id="viewer"></div>

<!--  NAV BUTTONS -->
<div class="controls">
  <button onclick="prev()">&lt;</button>
  <button onclick="next()">&gt;</button>
</div>

<script>
const totalPages = 200;

let page = 1;

/* state */
let year = "1990";
let month = "10";

/* helpers */
function pad(n, size) {
  return String(n).padStart(size, '0');
}

/* folder + file path */
function getDateFolder() {
  return `${year}${month}01`;
}

function imgSrc(n) {
  const prefix = `NGM_${year}_${month}_`;
  return `${getDateFolder()}/${prefix}${pad(n,3)}_4.jpg`;
}

/* fallback */
function createNotFound() {
  const div = document.createElement("div");
  div.className = "not-found";
  div.textContent = "No Page (Ignore)";
  return div;
}

/* image */
function createImage(n) {
  const img = document.createElement("img");
  img.src = imgSrc(n);

  img.onerror = function () {
    img.replaceWith(createNotFound());
  };

  return img;
}

/* render */
function render() {
  const viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  if (page === 1) {
    const img = createImage(1);
    img.className = "single-page";
    viewer.appendChild(img);
    return;
  }

  const spread = document.createElement("div");
  spread.className = "spread";

  const left = page;
  const right = page + 1;

  spread.appendChild(createImage(left));
  spread.appendChild(
    right <= totalPages ? createImage(right) : createNotFound()
  );

  viewer.appendChild(spread);
}

/* navigation */
function next() {
  page = (page === 1) ? 2 : page + 2;
  if (page > totalPages) page = totalPages;
  render();
}

function prev() {
  if (page === 1) return;
  page = (page <= 3) ? 1 : page - 2;
  render();
}

/* keyboard */
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

/* dropdowns */
const yearSelect = document.getElementById("yearSelect");
const monthSelect = document.getElementById("monthSelect");

/* years */
for (let y = 1888; y <= 2008; y++) {
  const opt = document.createElement("option");
  opt.value = y;
  opt.textContent = y;
  if (y == year) opt.selected = true;
  yearSelect.appendChild(opt);
}

/* months */
for (let m = 1; m <= 12; m++) {
  const mm = pad(m, 2);
  const opt = document.createElement("option");
  opt.value = mm;
  opt.textContent = mm;
  if (mm === month) opt.selected = true;
  monthSelect.appendChild(opt);
}

/* update handlers */
yearSelect.addEventListener("change", () => {
  year = yearSelect.value;
  page = 1;
  render();
});

monthSelect.addEventListener("change", () => {
  month = monthSelect.value;
  page = 1;
  render();
});

/* init */
render();
</script>

</body>
</html>
